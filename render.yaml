# TaskEasy — Render Blueprint
# Deploy: https://render.com/deploy → connect your repo
#
# Prerequisites (not managed by Render):
#   1. MongoDB Atlas — create a free cluster at https://cloud.mongodb.com
#      and paste the connection string into the DATABASE_URL env var below.
#   2. Cloudinary — sign up at https://cloudinary.com for file uploads.

services:
  # ─── NestJS API ────────────────────────────────────────────────────────────
  - type: web
    name: taskeasy-api
    runtime: node
    plan: free
    buildCommand: cd apps/api && npm install --include=dev && npx prisma generate --schema ../../prisma/schema.prisma && npm run build
    startCommand: cd apps/api && npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        fromService:
          name: taskeasy-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://taskeasy-web.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "TaskEasy <no-reply@taskeasy.app>"

  # ─── Next.js Frontend ──────────────────────────────────────────────────────
  - type: web
    name: taskeasy-web
    runtime: node
    plan: free
    buildCommand: cd apps/web && npm install --include=dev && npm run build
    startCommand: cd apps/web && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://taskeasy-api.onrender.com/api
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false

  # ─── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: taskeasy-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
