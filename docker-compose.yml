# TaskEasy — Local Development Stack
# Usage: docker compose up -d
# Then run: cd apps/api && npm run db:push

services:

  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: taskeasy-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: taskeasy
      MONGO_INITDB_ROOT_PASSWORD: taskeasy_dev
      MONGO_INITDB_DATABASE: taskeasy
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskeasy-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── NestJS API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runner
    container_name: taskeasy-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mongodb://taskeasy:taskeasy_dev@mongo:27017/taskeasy?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-change-in-prod}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-TaskEasy <no-reply@taskeasy.app>}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Next.js Frontend (optional — can run with `npm run dev` locally) ──────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: taskeasy-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - api
    profiles:
      - full  # only starts with: docker compose --profile full up

volumes:
  mongo_data:
  redis_data:
